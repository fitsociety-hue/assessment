<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대시보드 - 강동어울림복지관</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="dashboard-layout">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>강동어울림복지관</h2>
                <div class="user-info" id="sidebarUserInfo"></div>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li><a href="dashboard.html" class="active"><i class="fas fa-chart-pie"></i> 대시보드</a></li>
                    <li><a href="evaluation/self.html"><i class="fas fa-edit"></i> 자기평가</a></li>
                    <li><a href="evaluation/performance.html"><i class="fas fa-chart-line"></i> 성과평가</a></li>
                    <li><a href="evaluation/competency.html"><i class="fas fa-bullseye"></i> 역량평가</a></li>
                    <li><a href="evaluation/multifacet.html"><i class="fas fa-users"></i> 다면평가</a></li>
                    <li><a href="evaluation/comprehensive.html"><i class="fas fa-clipboard-list"></i> 종합평가</a></li>
                    <li class="admin-only"><a href="admin/employees.html"><i class="fas fa-user-cog"></i> 직원 관리</a></li>
                    <li class="admin-only"><a href="admin/reports.html"><i class="fas fa-file-alt"></i> 리포트</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="btn" onclick="auth.logout()">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </aside>

        <!-- 메인 컨텐츠 -->
        <main class="main-content">
            <!-- 상단 바 -->
            <header class="top-bar">
                <h1 class="page-title">대시보드</h1>
                <div class="user-menu">
                    <div class="user-info" id="topbarUserInfo"></div>
                </div>
            </header>

            <!-- 컨텐츠 영역 -->
            <div class="content-area">
                <!-- 통계 카드 -->
                <div class="stats-grid" id="statsGrid">
                    <div class="stat-card primary">
                        <div class="stat-label">현재 평가 기간</div>
                        <div class="stat-value" id="currentPeriod">-</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-label">완료한 평가</div>
                        <div class="stat-value" id="completedEvals">0</div>
                        <div class="stat-change">/ 총 5개</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">진행 중인 평가</div>
                        <div class="stat-value" id="pendingEvals">0</div>
                    </div>
                    <div class="stat-card info">
                        <div class="stat-label">최종 등급</div>
                        <div class="stat-value" id="finalGrade">-</div>
                    </div>
                </div>

                <!-- 평가 목록 -->
                <div class="grid grid-2">
                    <!-- 내 평가 현황 -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">내 평가 현황</h3>
                        </div>
                        <div class="card-body" id="myEvaluations">
                            <!-- 동적으로 채워질 내용 -->
                            <div class="text-center p-md">
                                <div class="spinner"></div>
                                <p>데이터를 불러오는 중...</p>
                            </div>
                        </div>
                    </div>

                    <!-- 최근 활동 -->
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">최근 활동</h3>
                        </div>
                        <div class="card-body" id="recentActivities">
                            <!-- 동적으로 채워질 내용 -->
                            <p class="text-secondary text-center p-md">최근 활동 내역이 없습니다.</p>
                        </div>
                    </div>
                </div>

                <!-- 관리자 전용 섹션 -->
                <div class="admin-only mt-xl">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">전체 평가 진행 현황 (관리자)</h3>
                        </div>
                        <div class="card-body" id="adminOverview">
                            <!-- 동적으로 채워질 내용 -->
                            <div class="text-center p-md">
                                <div class="spinner"></div>
                                <p>관리자 데이터를 불러오는 중...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 로딩 스피너 -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <div class="loader-message">처리 중...</div>
        </div>
    </div>

    <!-- 알림 컨테이너 -->
    <div id="alert-container"></div>

    <script src="js/config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. 필수 라이브러리 로드 확인
            if (typeof CONFIG === 'undefined' || typeof utils === 'undefined' || typeof api === 'undefined' || typeof auth === 'undefined') {
                console.error('필수 스크립트가 로드되지 않았습니다.');
                alert('시스템 초기화 오류: 필수 스크립트를 불러오지 못했습니다. 새로고침 해주세요.');
                return;
            }

            // 2. 페이지 접근 권한 확인
            if (!auth.checkPageAccess()) {
                return;
            }

            // 3. UI 초기화
            const userInfo = auth.getCurrentUser();
            if (userInfo) {
                // 사이드바 및 상단 바 사용자 정보 표시
                const userInfoHtml = `
                    <div class="user-profile">
                        <div class="user-name font-bold">${userInfo.name} ${userInfo.position}</div>
                        <div class="user-dept text-sm text-secondary">${userInfo.department}</div>
                    </div>
                `;

                const sidebarUserInfo = document.getElementById('sidebarUserInfo');
                if (sidebarUserInfo) sidebarUserInfo.innerHTML = userInfoHtml;

                const topbarUserInfo = document.getElementById('topbarUserInfo');
                if (topbarUserInfo) topbarUserInfo.innerHTML = userInfoHtml;

                // 관리자 메뉴 표시 여부
                if (auth.isAdmin()) {
                    document.querySelectorAll('.admin-only').forEach(el => el.classList.add('visible'));
                }
            }

            // 4. 데이터 로드
            try {
                await api.initialize();
                await loadDashboardData();
            } catch (error) {
                console.error('대시보드 데이터 로드 실패:', error);
                utils.showAlert('데이터를 불러오는데 실패했습니다. 잠시 후 다시 시도해주세요.', 'error');
            }
        });

        async function loadDashboardData() {
            const employeeId = auth.getCurrentUser().employeeId;
            const currentPeriod = CONFIG.EVALUATION_PERIODS[0] || '2024-상반기'; // 기본값

            document.getElementById('currentPeriod').textContent = currentPeriod;

            try {
                // 1. 내 평가 현황 로드 (자기평가 여부 확인)
                // 실제 데이터가 없으면 빈 배열 반환됨
                let selfEvals = [];
                try {
                    selfEvals = await api.findRows(CONFIG.SHEET_NAMES.SELF_EVALUATION, (row) =>
                        row.employee_id === employeeId && row.period === currentPeriod
                    );
                } catch (e) {
                    console.warn('자기평가 데이터 로드 실패 (시트가 없거나 비어있음):', e);
                }

                const isSelfDone = selfEvals.length > 0;

                // 2. 평가 현황 표시
                const myEvaluationsDiv = document.getElementById('myEvaluations');
                let evalHtml = '<ul class="evaluation-list" style="list-style: none; padding: 0;">';

                // 자기평가 상태
                evalHtml += `
                    <li class="evaluation-item">
                        <div class="evaluation-info">
                            <h4>자기평가</h4>
                            <div class="evaluation-meta">${isSelfDone ? '제출 완료' : '미제출'}</div>
                        </div>
                        <div class="evaluation-status">
                            <span class="badge ${isSelfDone ? 'badge-success' : 'badge-warning'}">
                                ${isSelfDone ? '완료' : '진행중'}
                            </span>
                        </div>
                    </li>
                `;

                // 다른 평가들도 여기에 추가 가능 (성과, 역량 등)

                evalHtml += '</ul>';
                myEvaluationsDiv.innerHTML = evalHtml;

                // 3. 통계 업데이트
                document.getElementById('completedEvals').textContent = isSelfDone ? 1 : 0;
                document.getElementById('pendingEvals').textContent = isSelfDone ? 0 : 1;

                // 4. 종합 평가 결과 (예시)
                try {
                    const comprehensive = await api.findRow(CONFIG.SHEET_NAMES.COMPREHENSIVE, 'employee_id', employeeId);
                    if (comprehensive && comprehensive.grade) {
                        const gradeInfo = CONFIG.GRADE_CRITERIA[comprehensive.grade] || { label: '' };
                        document.getElementById('finalGrade').innerHTML = `
                            <span class="badge badge-grade-${comprehensive.grade.toLowerCase()}">${comprehensive.grade}</span>
                            ${gradeInfo.label}
                        `;
                    }
                } catch (e) {
                    // 종합 평가 데이터가 없을 수 있음
                }

            } catch (error) {
                console.error('데이터 로드 중 오류:', error);
                document.getElementById('myEvaluations').innerHTML = '<p class="text-error p-md text-center">데이터를 불러오는데 실패했습니다.</p>';
            }

            // 관리자라면 전체 현황 로드
            if (auth.isAdmin()) {
                await loadAdminOverview(currentPeriod);
            }
        }

        // 관리자 전체 현황 로드
        async function loadAdminOverview(period) {
            try {
                // 병렬 로드
                const [employees, comprehensive] = await Promise.all([
                    api.readSheet(CONFIG.SHEET_NAMES.EMPLOYEES),
                    api.readSheet(CONFIG.SHEET_NAMES.COMPREHENSIVE).catch(() => []) // 실패 시 빈 배열
                ]);

                const totalEmployees = Math.max(0, employees.length - 1); // 헤더 제외
                const completedCount = comprehensive.filter(row => row.period === period).length;

                const html = `
                    <div class="stats-grid">
                        <div class="stat-card primary">
                            <div class="stat-label">총 직원 수</div>
                            <div class="stat-value">${totalEmployees}</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-label">평가 완료</div>
                            <div class="stat-value">${completedCount}</div>
                        </div>
                        <div class="stat-card warning">
                            <div class="stat-label">미완료</div>
                            <div class="stat-value">${Math.max(0, totalEmployees - completedCount)}</div>
                        </div>
                        <div class="stat-card info">
                            <div class="stat-label">완료율</div>
                            <div class="stat-value">${totalEmployees > 0 ? Math.round((completedCount / totalEmployees) * 100) : 0}%</div>
                        </div>
                    </div>
                    <div class="mt-lg text-right">
                        <a href="admin/reports.html" class="btn btn-primary">상세 리포트 보기</a>
                    </div>
                `;

                document.getElementById('adminOverview').innerHTML = html;

            } catch (error) {
                console.error('관리자 현황 로드 실패:', error);
                document.getElementById('adminOverview').innerHTML = '<p class="text-error p-md text-center">관리자 데이터를 불러오는데 실패했습니다.</p>';
            }
        }
    </script>
</body>

</html>
