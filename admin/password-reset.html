<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정 - 관리자</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .reset-container {
            max-width: 1000px;
            margin: var(--spacing-xl) auto;
            padding: var(--spacing-lg);
        }

        .reset-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .reset-header {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: var(--spacing-xl);
        }

        .reset-header h1 {
            margin: 0 0 var(--spacing-sm) 0;
            font-size: var(--font-2xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .reset-body {
            padding: var(--spacing-xl);
        }

        .search-section {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .search-section input {
            flex: 1;
        }

        .employee-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
        }

        .employee-item {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .employee-item:hover {
            background: var(--gray-50);
        }

        .employee-item:last-child {
            border-bottom: none;
        }

        .employee-info h4 {
            margin: 0 0 var(--spacing-xs) 0;
            color: var(--gray-900);
        }

        .employee-info p {
            margin: 0;
            font-size: var(--font-sm);
            color: var(--gray-600);
        }

        .warning-box {
            background: #fef3c7;
            border-left: 4px solid var(--warning);
            padding: var(--spacing-md);
            margin: var(--spacing-lg) 0;
            border-radius: var(--radius-md);
        }

        .warning-box h4 {
            margin: 0 0 var(--spacing-xs) 0;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .warning-box p {
            margin: 0;
            color: #78350f;
            font-size: var(--font-sm);
        }

        .reset-log {
            margin-top: var(--spacing-xl);
            padding: var(--spacing-lg);
            background: var(--gray-50);
            border-radius: var(--radius-lg);
        }

        .reset-log h3 {
            margin: 0 0 var(--spacing-md) 0;
            color: var(--gray-700);
        }

        .log-item {
            padding: var(--spacing-sm);
            border-left: 3px solid var(--primary);
            margin-bottom: var(--spacing-sm);
            background: white;
            border-radius: var(--radius-sm);
        }

        .log-time {
            font-size: var(--font-xs);
            color: var(--gray-500);
        }
    </style>
</head>

<body>
    <div id="global-loader" class="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loader-message">처리 중...</p>
        </div>
    </div>
    <div id="alert-container"></div>

    <div class="reset-container">
        <div style="margin-bottom: var(--spacing-lg);">
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 대시보드로 돌아가기
            </a>
        </div>

        <div class="reset-card">
            <div class="reset-header">
                <h1>
                    <i class="fas fa-unlock-alt"></i>
                    직원 비밀번호 재설정
                </h1>
                <p>직원의 비밀번호를 임시 비밀번호로 초기화합니다</p>
            </div>

            <div class="reset-body">
                <div class="warning-box">
                    <h4>
                        <i class="fas fa-exclamation-triangle"></i>
                        주의사항
                    </h4>
                    <p>
                        비밀번호 재설정 시 해당 직원의 비밀번호는 <strong>"1234"</strong>로 초기화됩니다.<br>
                        재설정 후 반드시 직원에게 알려주시고, 로그인 후 비밀번호를 변경하도록 안내해주세요.
                    </p>
                </div>

                <div class="search-section">
                    <input type="text" id="searchInput" class="form-input" placeholder="이름 또는 사번으로 검색...">
                    <button id="searchBtn" class="btn btn-primary">
                        <i class="fas fa-search"></i> 검색
                    </button>
                </div>

                <div class="employee-list" id="employeeList">
                    <div style="padding: var(--spacing-xl); text-align: center; color: var(--gray-500);">
                        위 검색창에서 직원을 검색하세요
                    </div>
                </div>

                <div class="reset-log" id="resetLog" style="display: none;">
                    <h3><i class="fas fa-history"></i> 재설정 내역</h3>
                    <div id="logContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let allEmployees = [];
        let resetHistory = [];

        document.addEventListener('DOMContentLoaded', async () => {
            // 관리자 권한 확인
            if (!auth.checkPageAccess('admin')) {
                return;
            }

            // 직원 데이터 로드
            await loadEmployees();

            // 이벤트 리스너
            document.getElementById('searchBtn').addEventListener('click', searchEmployees);
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchEmployees();
                }
            });
        });

        async function loadEmployees() {
            try {
                utils.showLoading('직원 데이터 로딩 중...');
                const data = await api.readSheet(CONFIG.SHEET_NAMES.EMPLOYEES);

                if (data && data.length > 1) {
                    const headers = data[0];
                    allEmployees = data.slice(1).map(row => {
                        const obj = {};
                        headers.forEach((header, index) => {
                            obj[header] = row[index];
                        });
                        return obj;
                    });
                }

                utils.hideLoading();
            } catch (error) {
                utils.hideLoading();
                utils.showAlert('직원 데이터 로드 실패: ' + error.message, 'error');
            }
        }

        function searchEmployees() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!searchTerm) {
                utils.showAlert('검색어를 입력해주세요.', 'warning');
                return;
            }

            const results = allEmployees.filter(emp =>
                (emp.name && emp.name.toLowerCase().includes(searchTerm)) ||
                (emp.employee_id && emp.employee_id.toLowerCase().includes(searchTerm))
            );

            displayResults(results);
        }

        function displayResults(results) {
            const listContainer = document.getElementById('employeeList');

            if (results.length === 0) {
                listContainer.innerHTML = `
                    <div style="padding: var(--spacing-xl); text-align: center; color: var(--gray-500);">
                        <i class="fas fa-search" style="font-size: 3rem; margin-bottom: var(--spacing-md); opacity: 0.3;"></i><br>
                        검색 결과가 없습니다
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = '';
            results.forEach(emp => {
                const item = document.createElement('div');
                item.className = 'employee-item';
                item.innerHTML = `
                    <div class="employee-info">
                        <h4>${emp.name || '-'}</h4>
                        <p>사번: ${emp.employee_id || '-'} | 부서: ${emp.department || '-'} | 직급: ${emp.position || '-'}</p>
                    </div>
                    <button class="btn btn-warning" onclick="resetPassword('${emp.employee_id}', '${emp.name}')">
                        <i class="fas fa-redo"></i> 비밀번호 초기화
                    </button>
                `;
                listContainer.appendChild(item);
            });
        }

        window.resetPassword = async (employeeId, employeeName) => {
            if (!confirm(`${employeeName} 님의 비밀번호를 "1234"로 초기화하시겠습니까?\n\n초기화 후 반드시 본인에게 알려주세요.`)) {
                return;
            }

            try {
                utils.showLoading('비밀번호 초기화 중...');

                // 임시 비밀번호 "1234"의 해시값 생성
                const tempPassword = '1234';
                const salt = 'assessment_salt_2024';
                const combined = tempPassword + salt;
                const passwordHash = btoa(combined);

                // 비밀번호 업데이트
                await api.updateRow(
                    CONFIG.SHEET_NAMES.EMPLOYEES,
                    'employee_id',
                    employeeId,
                    { password_hash: passwordHash }
                );

                utils.hideLoading();
                utils.showAlert(
                    `비밀번호가 성공적으로 초기화되었습니다.\n\n직원: ${employeeName}\n임시 비밀번호: 1234\n\n해당 직원에게 반드시 알려주세요!`,
                    'success'
                );

                // 로그 추가
                addResetLog(employeeId, employeeName);

            } catch (error) {
                utils.hideLoading();
                utils.showAlert('비밀번호 초기화 실패: ' + error.message, 'error');
            }
        };

        function addResetLog(employeeId, employeeName) {
            const now = new Date();
            const timeStr = now.toLocaleString('ko-KR');

            resetHistory.unshift({
                employeeId,
                employeeName,
                time: timeStr
            });

            // 최대 10개까지만 보관
            if (resetHistory.length > 10) {
                resetHistory = resetHistory.slice(0, 10);
            }

            displayResetLog();
        }

        function displayResetLog() {
            const logSection = document.getElementById('resetLog');
            const logContent = document.getElementById('logContent');

            if (resetHistory.length === 0) {
                logSection.style.display = 'none';
                return;
            }

            logSection.style.display = 'block';
            logContent.innerHTML = '';

            resetHistory.forEach(log => {
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `
                    <div><strong>${log.employeeName}</strong> (${log.employeeId})</div>
                    <div class="log-time">${log.time}</div>
                `;
                logContent.appendChild(item);
            });
        }
    </script>
</body>

</html>
