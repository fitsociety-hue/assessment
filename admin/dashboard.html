<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 강동어울림복지관</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --admin-primary: #4f46e5;
            --admin-primary-dark: #4338ca;
            --admin-secondary: #7c3aed;
            --admin-accent: #ec4899;
            --admin-success: #10b981;
            --admin-warning: #f59e0b;
            --admin-danger: #ef4444;
            --admin-glass: rgba(255, 255, 255, 0.1);
            --admin-glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-xl);
        }

        .admin-header {
            background: var(--admin-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--admin-glass-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: white;
            font-size: var(--font-2xl);
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .admin-header h1 i {
            color: var(--admin-accent);
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .user-badge {
            background: var(--admin-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--admin-glass-border);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-lg);
            color: white;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .nav-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .nav-card {
            background: var(--admin-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--admin-glass-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: var(--spacing-md);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
        }

        .nav-card i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-card h3 {
            margin: 0;
            font-size: var(--font-lg);
            font-weight: 600;
        }

        .nav-card p {
            margin: 0;
            font-size: var(--font-sm);
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: var(--admin-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--admin-glass-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            color: white;
        }

        .stat-card h3 {
            margin: 0 0 var(--spacing-md) 0;
            font-size: var(--font-sm);
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
            background: linear-gradient(135deg, white, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-detail {
            font-size: var(--font-sm);
            opacity: 0.7;
        }

        .quick-actions {
            background: var(--admin-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--admin-glass-border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            color: white;
        }

        .quick-actions h2 {
            margin: 0 0 var(--spacing-lg) 0;
            font-size: var(--font-xl);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-primary-dark));
            border: none;
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-lg);
            color: white;
            font-size: var(--font-md);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            justify-content: center;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(79, 70, 229, 0.4);
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, var(--admin-secondary), var(--admin-accent));
        }

        .action-btn.warning {
            background: linear-gradient(135deg, var(--admin-warning), #d97706);
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: var(--spacing-md);
            }

            .nav-menu {
                grid-template-columns: 1fr;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="global-loader" class="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loader-message">처리 중...</p>
        </div>
    </div>
    <div id="alert-container"></div>

    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1>
                <i class="fas fa-shield-alt"></i>
                관리자 대시보드
            </h1>
            <div class="admin-info">
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="adminName">관리자</span>
                </div>
                <button class="btn btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <h3>총 직원 수</h3>
                <div class="stat-value" id="totalEmployees">0</div>
                <div class="stat-detail">등록된 전체 직원</div>
            </div>
            <div class="stat-card">
                <h3>부서 수</h3>
                <div class="stat-value" id="totalDepartments">6</div>
                <div class="stat-detail">운영 중인 부서</div>
            </div>
            <div class="stat-card">
                <h3>관리자 수</h3>
                <div class="stat-value" id="totalAdmins">0</div>
                <div class="stat-detail">관장 + 사무국장 + 팀장</div>
            </div>
        </div>

        <!-- Navigation Menu -->
        <div class="nav-menu">
            <a href="permissions.html" class="nav-card">
                <i class="fas fa-user-shield"></i>
                <h3>직원 권한 관리</h3>
                <p>직원의 권한을 설정하고 관리합니다</p>
            </a>
            <a href="password-change.html" class="nav-card">
                <i class="fas fa-key"></i>
                <h3>내 비밀번호 변경</h3>
                <p>관리자 본인의 비밀번호를 변경합니다</p>
            </a>
            <a href="password-reset.html" class="nav-card">
                <i class="fas fa-unlock-alt"></i>
                <h3>직원 비밀번호 재설정</h3>
                <p>직원의 비밀번호를 초기화합니다</p>
            </a>
            <a href="employees.html" class="nav-card">
                <i class="fas fa-users"></i>
                <h3>직원 관리</h3>
                <p>직원 정보를 조회하고 관리합니다</p>
            </a>
            <a href="../dashboard.html" class="nav-card">
                <i class="fas fa-chart-line"></i>
                <h3>일반 대시보드</h3>
                <p>직원 대시보드로 이동합니다</p>
            </a>
            <a href="reports.html" class="nav-card">
                <i class="fas fa-file-alt"></i>
                <h3>평가 리포트</h3>
                <p>전체 평가 현황을 확인합니다</p>
            </a>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <h2>
                <i class="fas fa-bolt"></i>
                빠른 작업
            </h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="location.href='permissions.html'">
                    <i class="fas fa-user-cog"></i> 권한 설정
                </button>
                <button class="action-btn secondary" onclick="location.href='password-reset.html'">
                    <i class="fas fa-redo"></i> 비밀번호 초기화
                </button>
                <button class="action-btn warning" onclick="loadStatistics()">
                    <i class="fas fa-sync"></i> 통계 새로고침
                </button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 관리자 권한 확인
            if (!auth.checkPageAccess('admin')) {
                return;
            }

            const currentUser = auth.getCurrentUser();
            if (currentUser) {
                document.getElementById('adminName').textContent = currentUser.name;
            }

            // 통계 로드
            await loadStatistics();
        });

        async function loadStatistics() {
            try {
                utils.showLoading('통계 로딩 중...');

                // 직원 정보 조회
                const employees = await api.readSheet(CONFIG.SHEET_NAMES.EMPLOYEES);

                if (employees && employees.length > 1) {
                    // 헤더 제외
                    const headers = employees[0];
                    const data = employees.slice(1);

                    // 총 직원 수
                    document.getElementById('totalEmployees').textContent = data.length;

                    // 관리자 수 계산 (role 컬럼 찾기)
                    const roleIndex = headers.indexOf('role');
                    if (roleIndex !== -1) {
                        const adminCount = data.filter(row => {
                            const role = row[roleIndex];
                            return role === 'admin' || role === 'director' || role === 'manager';
                        }).length;
                        document.getElementById('totalAdmins').textContent = adminCount;
                    }
                }

                utils.hideLoading();
            } catch (error) {
                utils.hideLoading();
                console.error('통계 로드 실패:', error);
                utils.showAlert('통계를 불러오는데 실패했습니다.', 'error');
            }
        }

        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                auth.logout();
            }
        }
    </script>
</body>

</html>
