<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - 관리자</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .password-container {
            max-width: 600px;
            margin: var(--spacing-xl) auto;
            padding: var(--spacing-lg);
        }

        .password-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .password-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: var(--spacing-xl);
            text-align: center;
        }

        .password-header h1 {
            margin: 0 0 var(--spacing-sm) 0;
            font-size: var(--font-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-md);
        }

        .password-body {
            padding: var(--spacing-xl);
        }

        .strength-meter {
            height: 8px;
            background: var(--gray-200);
            border-radius: var(--radius-md);
            margin-top: var(--spacing-sm);
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: var(--radius-md);
        }

        .strength-weak {
            background: var(--danger);
            width: 33%;
        }

        .strength-medium {
            background: var(--warning);
            width: 66%;
        }

        .strength-strong {
            background: var(--success);
            width: 100%;
        }

        .strength-label {
            font-size: var(--font-sm);
            margin-top: var(--spacing-xs);
            color: var(--gray-600);
        }

        .password-requirements {
            background: var(--gray-50);
            border-left: 4px solid var(--primary);
            padding: var(--spacing-md);
            margin: var(--spacing-lg) 0;
            border-radius: var(--radius-md);
        }

        .password-requirements h4 {
            margin: 0 0 var(--spacing-sm) 0;
            color: var(--gray-700);
        }

        .password-requirements ul {
            margin: 0;
            padding-left: var(--spacing-lg);
            color: var(--gray-600);
        }

        .password-requirements li {
            margin: var(--spacing-xs) 0;
        }
    </style>
</head>

<body>
    <div id="global-loader" class="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p class="loader-message">처리 중...</p>
        </div>
    </div>
    <div id="alert-container"></div>

    <div class="password-container">
        <div style="margin-bottom: var(--spacing-lg);">
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> 대시보드로 돌아가기
            </a>
        </div>

        <div class="password-card">
            <div class="password-header">
                <h1>
                    <i class="fas fa-key"></i>
                    비밀번호 변경
                </h1>
                <p>관리자 본인의 비밀번호를 안전하게 변경하세요</p>
            </div>

            <div class="password-body">
                <form id="passwordChangeForm">
                    <div class="form-group">
                        <label for="currentPassword" class="form-label required">현재 비밀번호</label>
                        <input type="password" id="currentPassword" name="currentPassword" class="form-input" required
                            placeholder="현재 비밀번호를 입력하세요">
                    </div>

                    <div class="form-group">
                        <label for="newPassword" class="form-label required">새 비밀번호</label>
                        <input type="password" id="newPassword" name="newPassword" class="form-input" required
                            placeholder="새 비밀번호를 입력하세요">
                        <div class="strength-meter">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label required">새 비밀번호 확인</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required
                            placeholder="새 비밀번호를 다시 입력하세요">
                    </div>

                    <div class="password-requirements">
                        <h4><i class="fas fa-info-circle"></i> 비밀번호 요구사항</h4>
                        <ul>
                            <li>최소 8자 이상</li>
                            <li>영문자와 숫자 조합</li>
                            <li>특수문자 포함 권장</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-check"></i> 비밀번호 변경
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 관리자 권한 확인
            if (!auth.checkPageAccess('admin')) {
                return;
            }

            // 비밀번호 강도 체크
            const newPasswordInput = document.getElementById('newPassword');
            newPasswordInput.addEventListener('input', checkPasswordStrength);

            // 폼 제출
            document.getElementById('passwordChangeForm').addEventListener('submit', handleSubmit);
        });

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthLabel = document.getElementById('strengthLabel');

            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthBar.className = 'strength-bar';

            if (strength < 3) {
                strengthBar.classList.add('strength-weak');
                strengthLabel.textContent = '약함';
                strengthLabel.style.color = 'var(--danger)';
            } else if (strength < 5) {
                strengthBar.classList.add('strength-medium');
                strengthLabel.textContent = '보통';
                strengthLabel.style.color = 'var(--warning)';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthLabel.textContent = '강함';
                strengthLabel.style.color = 'var(--success)';
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 유효성 검사
            if (newPassword.length < 8) {
                utils.showAlert('비밀번호는 최소 8자 이상이어야 합니다.', 'warning');
                return;
            }

            if (!/[a-zA-Z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
                utils.showAlert('비밀번호는 영문자와 숫자를 포함해야 합니다.', 'warning');
                return;
            }

            if (newPassword !== confirmPassword) {
                utils.showAlert('새 비밀번호가 일치하지 않습니다.', 'warning');
                return;
            }

            if (currentPassword === newPassword) {
                utils.showAlert('현재 비밀번호와 새 비밀번호가 같습니다.', 'warning');
                return;
            }

            try {
                utils.showLoading('비밀번호 변경 중...');

                await auth.changePassword(currentPassword, newPassword);

                utils.hideLoading();
                utils.showAlert('비밀번호가 성공적으로 변경되었습니다.', 'success');

                // 폼 초기화
                document.getElementById('passwordChangeForm').reset();
                document.getElementById('strengthBar').className = 'strength-bar';
                document.getElementById('strengthLabel').textContent = '';

                // 3초 후 대시보드로 이동
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);

            } catch (error) {
                utils.hideLoading();
                utils.showAlert(error.message || '비밀번호 변경에 실패했습니다.', 'error');
            }
        }
    </script>
</body>

</html>
