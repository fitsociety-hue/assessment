<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - 강동어울림복지관 평가 시스템</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            background-color: var(--bg-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .signup-container {
            background: white;
            padding: var(--spacing-2xl);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
        }

        .signup-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .signup-header h1 {
            color: var(--primary-color);
            font-size: var(--font-2xl);
            margin-bottom: var(--spacing-sm);
        }

        .signup-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: var(--spacing-sm) var(--spacing-md);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: var(--font-md);
            transition: border-color var(--transition-fast);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-signup {
            width: 100%;
            padding: var(--spacing-md);
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-md);
            font-weight: 600;
            cursor: pointer;
            transition: background-color var(--transition-fast);
            margin-top: var(--spacing-lg);
        }

        .btn-signup:hover {
            background-color: var(--primary-dark);
        }

        .login-link {
            text-align: center;
            margin-top: var(--spacing-lg);
            font-size: var(--font-sm);
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .form-row {
            display: flex;
            gap: var(--spacing-md);
        }

        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>회원가입</h1>
            <p>강동어울림복지관 평가 시스템</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="name" class="form-label">이름</label>
                <input type="text" id="name" class="form-input" required placeholder="홍길동">
            </div>

            <div class="form-group">
                <label for="employeeId" class="form-label">아이디</label>
                <input type="text" id="employeeId" class="form-input" required placeholder="영문, 숫자 조합">
            </div>

            <div class="form-group">
                <label class="form-label">입사년월</label>
                <div class="form-row">
                    <input type="number" id="joinYear" class="form-input" placeholder="YYYY" min="2000" max="2099"
                        required>
                    <select id="joinMonth" class="form-select" required>
                        <option value="">월</option>
                        <option value="01">1월</option>
                        <option value="02">2월</option>
                        <option value="03">3월</option>
                        <option value="04">4월</option>
                        <option value="05">5월</option>
                        <option value="06">6월</option>
                        <option value="07">7월</option>
                        <option value="08">8월</option>
                        <option value="09">9월</option>
                        <option value="10">10월</option>
                        <option value="11">11월</option>
                        <option value="12">12월</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-signup">가입하기</button>
        </form>

        <div class="login-link">
            이미 계정이 있으신가요? <a href="index.html">로그인하기</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js?v=3"></script>
    <script src="js/utils.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 부서 목록 로드
            const deptSelect = document.getElementById('department');
            CONFIG.ORGANIZATION.DEPARTMENTS.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                deptSelect.appendChild(option);
            });

            // 직급 목록 로드
            const posSelect = document.getElementById('position');
            CONFIG.ORGANIZATION.POSITIONS.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos;
                option.textContent = pos;
                posSelect.appendChild(option);
            });

            // 직군 목록 로드
            const jobTypeSelect = document.getElementById('jobType');
            if (CONFIG.ORGANIZATION.JOB_TYPES) {
                CONFIG.ORGANIZATION.JOB_TYPES.forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    jobTypeSelect.appendChild(option);
                });
            }

            // 회원가입 처리
            document.getElementById('signupForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const userData = {
                    name: document.getElementById('name').value,
                    employeeId: document.getElementById('employeeId').value,
                    password: document.getElementById('password').value,
                    department: document.getElementById('department').value,
                    jobType: document.getElementById('jobType').value,
                    position: document.getElementById('position').value,
                    joinDate: `${document.getElementById('joinYear').value}-${document.getElementById('joinMonth').value}`
                };

                utils.showLoading('회원가입 처리 중...');

                try {
                    await auth.register(userData);
                    utils.hideLoading();
                    alert('회원가입이 완료되었습니다. 로그인해주세요.');
                    window.location.href = 'index.html';
                } catch (error) {
                    utils.hideLoading();
                    console.error('회원가입 실패:', error);
                    alert('회원가입 실패: ' + error.message);
                }
            });
        });
    </script>
</body>

</html>
