        <!DOCTYPE html>
        <html lang="ko">

        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>강동어울림복지관 평가 시스템 - 회원가입</title>

            <!-- Google Fonts -->
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
                rel="stylesheet">

            <!-- Stylesheets -->
            <link rel="stylesheet" href="css/main.css">

            <style>
                .signup-container {
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: var(--spacing-lg);
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                }

                .signup-card {
                    width: 100%;
                    max-width: 500px;
                    background: white;
                    border-radius: var(--radius-xl);
                    box-shadow: var(--shadow-xl);
                    overflow: hidden;
                }

                .signup-header {
                    padding: var(--spacing-xl);
                    background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
                    color: white;
                    text-align: center;
                }

                .signup-header h1 {
                    font-size: var(--font-xl);
                    font-weight: 700;
                    margin-bottom: var(--spacing-xs);
                    color: white;
                }

                .signup-body {
                    padding: var(--spacing-xl);
                    max-height: 70vh;
                    overflow-y: auto;
                }

                .form-row {
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                    gap: var(--spacing-md);
                }

                .signup-footer {
                    padding: var(--spacing-lg);
                    background: var(--gray-50);
                    text-align: center;
                    border-top: 1px solid var(--gray-200);
                }
            </style>
        </head>

        <body>
            <!-- 로딩 스피너 -->
            <div id="global-loader" class="loader">
                <div class="loader-content">
                    <div class="spinner"></div>
                    <p class="loader-message">처리 중...</p>
                </div>
            </div>

            <!-- 알림 컨테이너 -->
            <div id="alert-container"></div>

            <div class="signup-container">
                <div class="signup-card">
                    <div class="signup-header">
                        <h1>회원가입</h1>
                        <p>강동어울림복지관 직원 평가 시스템</p>
                    </div>

                    <div class="signup-body">
                        <form id="signupForm">
                            <!-- 기본 정보 -->
                            <!-- 직원 ID 필드 삭제됨 (자동 생성) -->

                            <div class="form-group">
                                <label for="password" class="form-label required">비밀번호</label>
                                <input type="password" id="password" name="password" class="form-input" required
                                    placeholder="비밀번호를 입력하세요">
                            </div>

                            <div class="form-group">
                                <label for="name" class="form-label required">이름</label>
                                <input type="text" id="name" name="name" class="form-input" required
                                    placeholder="이름을 입력하세요">
                            </div>

                            <!-- 소속 정보 -->
                            <div class="form-group">
                                <label for="department" class="form-label required">팀명 (소속)</label>
                                <select id="department" name="department" class="form-select" required>
                                    <option value="">선택하세요</option>
                                </select>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="jobType" class="form-label required">직종</label>
                                    <input type="text" id="jobType" name="jobType" class="form-input" required
                                        placeholder="직종을 입력하세요">
                                </div>
                                <div class="form-group">
                                    <label for="position" class="form-label required">직위 (직급)</label>
                                    <input type="text" id="position" name="position" class="form-input" required
                                        placeholder="직위를 입력하세요">
                                </div>
                            </div>

                            <!-- 입사일 -->
                            <div class="form-group">
                                <label class="form-label required">입사 연월</label>
                                <div class="form-row">
                                    <input type="number" id="joinYear" name="joinYear" class="form-input"
                                        placeholder="년(YYYY)" min="2000" max="2099" required>
                                    <select id="joinMonth" name="joinMonth" class="form-select" required>
                                        <option value="">월</option>
                                        <option value="1">1월</option>
                                        <option value="2">2월</option>
                                        <option value="3">3월</option>
                                        <option value="4">4월</option>
                                        <option value="5">5월</option>
                                        <option value="6">6월</option>
                                        <option value="7">7월</option>
                                        <option value="8">8월</option>
                                        <option value="9">9월</option>
                                        <option value="10">10월</option>
                                        <option value="11">11월</option>
                                        <option value="12">12월</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary"
                                style="width: 100%; margin-top: var(--spacing-lg);">가입하기</button>
                        </form>
                    </div>

                    <div class="signup-footer">
                        이미 계정이 있으신가요? <a href="index.html" class="text-primary">로그인하기</a>
                    </div>
                </div>
            </div>

            <!-- Scripts -->
            <script src="js/config.js"></script>
            <script src="js/utils.js"></script>
            <script src="js/api.js"></script>
            <script src="js/auth.js"></script>

            <script>
                document.addEventListener('DOMContentLoaded', async () => {
                    // 1. 필수 라이브러리 로드 확인
                    if (typeof CONFIG === 'undefined' || typeof utils === 'undefined' || typeof api === 'undefined' || typeof auth === 'undefined') {
                        console.error('필수 스크립트가 로드되지 않았습니다.');
                        alert('시스템 초기화 오류: 필수 스크립트를 불러오지 못했습니다. 새로고침 해주세요.');
                        return;
                    }

                    // 2. API 초기화
                    try {
                        await api.initialize();
                    } catch (error) {
                        console.error('API 초기화 실패:', error);
                    }

                    // 3. 옵션 채우기
                    populateOptions();

                    // 4. 폼 제출 처리
                    document.getElementById('signupForm').addEventListener('submit', async (e) => {
                        e.preventDefault();

                        // 직원 ID 자동 생성 (6자리 숫자)
                        const generatedId = Math.floor(100000 + Math.random() * 900000).toString();

                        const formData = {
                            employeeId: generatedId,
                            password: document.getElementById('password').value,
                            name: document.getElementById('name').value.trim(),
                            department: document.getElementById('department').value,
                            jobType: document.getElementById('jobType').value.trim(),
                            position: document.getElementById('position').value.trim(),
                            joinDate: `${document.getElementById('joinYear').value}-${document.getElementById('joinMonth').value.padStart(2, '0')}-01`
                        };

                        try {
                            utils.showLoading('회원가입 처리 중...');

                            // auth.register 호출
                            await auth.register(formData);

                            utils.hideLoading();
                            alert(`회원가입이 완료되었습니다.\n\n발급된 직원 ID: ${generatedId}\n\n로그인 시 이 ID를 사용해주세요.`);
                            window.location.href = 'index.html';

                        } catch (error) {
                            utils.hideLoading();
                            utils.showAlert(error.message || '회원가입 실패', 'error');
                        }
                    });
                });

                function populateOptions() {
                    // 부서
                    const deptSelect = document.getElementById('department');
                    CONFIG.ORGANIZATION.DEPARTMENTS.forEach(dept => {
                        const option = document.createElement('option');
                        option.value = dept;
                        option.textContent = dept;
                        deptSelect.appendChild(option);
                    });
                }
            </script>
        </body>

        </html>
